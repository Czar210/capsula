<style>
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--font-sans);
    -webkit-font-smoothing: antialiased;
    overflow-x: clip;
  }
  ::selection { background: var(--green-32); color: var(--egg-100); }

  /* subtle scroll cue bob — calm, not infinite-distracting */
  @media (prefers-reduced-motion: no-preference) {
    .cap-scroll-cue { animation: capBob 2.4s var(--ease-soft) infinite; }
    @keyframes capBob {
      0%, 100% { transform: translateY(0); opacity: 0.55; }
      50% { transform: translateY(6px); opacity: 1; }
    }
    .cap-year-panel { animation: capFade var(--dur-slow) var(--ease-out); }
    @keyframes capFade {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
  }

  /* print: just the poster, clean white-less dark card */
  @media print {
    .cap-grain, [aria-hidden="true"] { }
    body * { visibility: hidden; }
    #capsula-poster, #capsula-poster * { visibility: visible; }
    #capsula-poster { position: absolute; left: 0; top: 0; box-shadow: none; }
  }
</style>
</head>
